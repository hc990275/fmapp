name: Multi-Branch Hourly Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 * * * *" # 每小时
  workflow_dispatch:

jobs:
  sync_branches:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    
    strategy:
      fail-fast: false
      matrix:
        # ⚠️ 这里只能填【上游作者也有】的分支
        # 如果上游没有 ok 分支，就算修好了这个报错，下一步也会失败
        branch: [main, app, img, ok, 2.9.1-pro]

    steps:
      # 👇 修改了这里：添加 fetch-depth: 0 👇
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          # 0 表示拉取所有分支的历史记录，这样脚本才能识别到 ok 分支

      - name: Sync ${{ matrix.branch }} from upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: lystv/fmapp
          upstream_sync_branch: ${{ matrix.branch }}
          target_sync_branch: ${{ matrix.branch }}
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          test_mode: false

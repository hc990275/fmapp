name: Multi-Branch Hourly Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 * * * *" # 每小时执行一次
  workflow_dispatch: # 允许手动点击运行

jobs:
  sync_branches:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    
    strategy:
      fail-fast: false
      matrix:
        # 👇【关键修改区域】👇
        # 请只保留上游仓库(lystv/fmapp)里实际存在的分支
        # 我排除了那些看起来像时间戳备份的分支
        branch: [main, app, img, ok, 2.9.1-pro] 

    steps:
      - uses: actions/checkout@v4

      - name: Sync ${{ matrix.branch }} from upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: lystv/fmapp      # 上游仓库
          upstream_sync_branch: ${{ matrix.branch }} # 上游的分支名
          target_sync_branch: ${{ matrix.branch }}   # 你仓库的分支名
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          test_mode: false
